<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Tambah Appointment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#f8fafc;
            font-family:'Poppins',sans-serif;
        }

        .card-form{
            border:none;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0 15px 35px rgba(0,0,0,.08);
            animation:fadeIn .4s ease;
        }

        .header{
            background:linear-gradient(
                    135deg,
                    #7c3aed,
                    #5b21b6
            );
            color:white;
            padding:30px;
        }

        .header h2{
            margin:0;
            font-weight:700;
        }

        .header p{
            margin-top:8px;
            opacity:.9;
        }

        .card-body{
            padding:35px;
        }

        .form-label{
            font-weight:600;
            margin-bottom:10px;
        }

        .form-control,
        .form-select{
            height:52px;
            border-radius:14px;
            border:1px solid #e2e8f0;
        }

        textarea.form-control{
            height:auto;
        }

        .form-control:focus,
        .form-select:focus{
            border-color:#7c3aed;
            box-shadow:0 0 0 .25rem rgba(124,58,237,.15);
        }

        .input-group-text{
            border-radius:14px 0 0 14px;
            background:white;
        }

        .btn{
            border-radius:14px;
            padding:12px 20px;
            font-weight:600;
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-2px);
        }

        .btn-save{
            background:#7c3aed;
            color:white;
            border:none;
        }

        .btn-save:hover{
            background:#6d28d9;
            color:white;
        }

        .info-box{
            background:#f3f4f6;
            border-left:5px solid #7c3aed;
            padding:15px;
            border-radius:12px;
            margin-bottom:25px;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(10px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-8">

            <div class="card card-form">

                <div class="header">

                    <h2>

                        <i class="fas fa-calendar-check"></i>

                        Appointment Baru

                    </h2>

                    <p>

                        Buat jadwal konsultasi pasien dengan dokter

                    </p>

                </div>

                <div class="card-body">

                    <div class="info-box">

                        <i class="fas fa-circle-info"></i>

                        Lengkapi data appointment di bawah ini.

                    </div>

                    <form action="/appointments/save"
                          method="post">

                        <div class="mb-4">

                            <label class="form-label">

                                <i class="fas fa-user-injured"></i>

                                Pasien

                            </label>

                            <select name="patientId"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Pilih Pasien
                                </option>

                                <option th:each="patient : ${patients}"
                                        th:value="${patient.id}"
                                        th:text="${patient.fullName}">
                                </option>

                            </select>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                <i class="fas fa-user-doctor"></i>

                                Dokter

                            </label>

                            <select name="doctorId"
                                    class="form-select"
                                    required>

                                <option value="">
                                    Pilih Dokter
                                </option>

                                <option th:each="doctor : ${doctors}"
                                        th:value="${doctor.id}"
                                        th:text="${doctor.fullName}">
                                </option>

                            </select>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                <i class="fas fa-calendar-days"></i>

                                Tanggal Appointment

                            </label>

                            <input type="datetime-local"
                                   name="appointmentDate"
                                   class="form-control"
                                   required>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                <i class="fas fa-notes-medical"></i>

                                Keluhan Pasien

                            </label>

                            <textarea
                                    name="complaint"
                                    class="form-control"
                                    rows="5"
                                    placeholder="Contoh: Demam tinggi sejak 3 hari, sakit kepala, batuk..."
                                    required></textarea>

                        </div>

                        <div class="d-flex gap-2">

                            <button class="btn btn-save">

                                <i class="fas fa-floppy-disk"></i>

                                Simpan Appointment

                            </button>

                            <a href="/appointments"
                               class="btn btn-secondary">

                                <i class="fas fa-arrow-left"></i>

                                Kembali

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
