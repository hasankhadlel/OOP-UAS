<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Data Appointment</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#f8fafc;
            font-family:'Poppins',sans-serif;
        }

        .page-header{
            background:linear-gradient(
                    135deg,
                    #2563eb,
                    #1d4ed8
            );
            color:white;
            padding:30px;
            border-radius:25px;
            margin-bottom:25px;
            box-shadow:0 15px 30px rgba(37,99,235,.25);
        }

        .page-header h1{
            font-weight:700;
            margin-bottom:10px;
        }

        .page-header p{
            opacity:.9;
        }

        .stats-card{
            border:none;
            border-radius:20px;
            background:white;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
            margin-bottom:25px;
        }

        .stats-card .number{
            font-size:35px;
            font-weight:700;
            color:#2563eb;
        }

        .card-custom{
            border:none;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        .table{
            margin-bottom:0;
        }

        .table thead{
            background:#1e293b;
            color:white;
        }

        .table tbody tr{
            transition:.3s;
        }

        .table tbody tr:hover{
            background:#f8fafc;
            transform:scale(1.005);
        }

        .btn{
            border-radius:12px;
            font-weight:500;
        }

        .btn:hover{
            transform:translateY(-2px);
        }

        .patient-avatar{
            width:42px;
            height:42px;
            border-radius:50%;
            background:#2563eb;
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:bold;
            margin-right:12px;
        }

        .status-pending{
            background:#fef3c7;
            color:#92400e;
            padding:8px 15px;
            border-radius:20px;
            font-size:13px;
            font-weight:600;
        }

        .status-approved{
            background:#dcfce7;
            color:#166534;
            padding:8px 15px;
            border-radius:20px;
            font-size:13px;
            font-weight:600;
        }

        .status-completed{
            background:#dbeafe;
            color:#1d4ed8;
            padding:8px 15px;
            border-radius:20px;
            font-size:13px;
            font-weight:600;
        }

        .complaint-box{
            max-width:250px;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }

        .action-group{
            display:flex;
            gap:8px;
        }

        .fade-card{
            animation:fadeIn .4s ease;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(10px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

    </style>

</head>

<body>

<div class="container py-4 fade-card">

    <div class="page-header">

        <h1>

            <i class="fas fa-calendar-check"></i>

            Appointment Management

        </h1>

        <p class="mb-0">

            Kelola jadwal konsultasi pasien dan dokter

        </p>

    </div>

    <div class="row mb-4">

        <div class="col-md-4">

            <div class="stats-card">

                <div class="card-body text-center">

                    <h6>Total Appointment</h6>

                    <div class="number"
                         th:text="${#lists.size(appointments)}">
                        0
                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="d-flex gap-2 mb-4">

        <a href="/"
           class="btn btn-dark">

            <i class="fas fa-house"></i>
            Dashboard

        </a>

        <a href="/appointments/add"
           class="btn btn-success">

            <i class="fas fa-plus"></i>
            Tambah Appointment

        </a>

    </div>

    <div class="card card-custom">

        <div class="card-body p-0">

            <table class="table align-middle">

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Pasien</th>
                    <th>Dokter</th>
                    <th>Tanggal</th>
                    <th>Keluhan</th>
                    <th>Status</th>
                    <th>Aksi</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="appointment : ${appointments}">

                    <td>

                        <strong th:text="${appointment.id}"></strong>

                    </td>

                    <td>

                        <div class="d-flex align-items-center">

                            <div class="patient-avatar">

                                <span th:text="${#strings.substring(appointment.patient.fullName,0,1)}">
                                    A
                                </span>

                            </div>

                            <div>

                                <strong th:text="${appointment.patient.fullName}"></strong>

                            </div>

                        </div>

                    </td>

                    <td th:text="${appointment.doctor.fullName}"></td>

                    <td th:text="${appointment.appointmentDate}"></td>

                    <td>

                        <div class="complaint-box"
                             th:text="${appointment.complaint}">
                        </div>

                    </td>

                    <td>

                        <span th:if="${appointment.status == 'PENDING'}"
                              class="status-pending">

                            PENDING

                        </span>

                        <span th:if="${appointment.status == 'APPROVED'}"
                              class="status-approved">

                            APPROVED

                        </span>

                        <span th:if="${appointment.status == 'COMPLETED'}"
                              class="status-completed">

                            COMPLETED

                        </span>

                    </td>

                    <td>

                        <div class="action-group">

                            <a sec:authorize="hasRole('DOCTOR')"
                               th:href="@{/medical-records/add/{id}(id=${appointment.id})}"
                               class="btn btn-primary btn-sm">

                                <i class="fas fa-stethoscope"></i>

                            </a>

                            <a sec:authorize="hasRole('ADMIN')"
                               th:href="@{/appointments/delete/{id}(id=${appointment.id})}"
                               class="btn btn-danger btn-sm">

                                <i class="fas fa-trash"></i>

                            </a>

                        </div>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
