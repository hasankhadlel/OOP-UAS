<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<title>Form Dokter</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet">

<link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      rel="stylesheet">

<style>

body{
    background:#f4f6f9;
}

.card-form{
    border:none;
    border-radius:20px;
    box-shadow:0 5px 15px rgba(0,0,0,.08);
}

.header{
    background:linear-gradient(135deg,#16a34a,#15803d);
    color:white;
    padding:20px;
    border-radius:20px 20px 0 0;
}

</style>

</head>

<body>

<div class="container mt-5">

<div class="card card-form">

<div class="header">

<h2>
<i class="fas fa-user-doctor"></i>
Form Dokter
</h2>

</div>

<div class="card-body">

<form th:action="@{/doctors/save}"
      th:object="${doctor}"
      method="post">

<input type="hidden"
       th:field="*{id}">

<div class="mb-3">

<label>Nama Dokter</label>

<input type="text"
       class="form-control"
       th:field="*{fullName}">

</div>

<div class="mb-3">

<label>Spesialisasi</label>

<input type="text"
       class="form-control"
       th:field="*{specialization}">

</div>

<div class="mb-3">

<label>No HP</label>

<input type="text"
       class="form-control"
       th:field="*{phone}">

</div>

<button class="btn btn-success">
Simpan
</button>

<a href="/doctors"
   class="btn btn-secondary">
Kembali
</a>

</form>

</div>

</div>

</div>

</body>

</html>
