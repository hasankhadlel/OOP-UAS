<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Registrasi Pasien</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                    135deg,
                    #2563eb,
                    #7c3aed
            );
            font-family:'Segoe UI',sans-serif;
            padding:20px;
        }

        .register-card{
            width:100%;
            max-width:700px;
            background:white;
            border-radius:30px;
            overflow:hidden;
            box-shadow:0 25px 50px rgba(0,0,0,.25);
        }

        .header{
            background:linear-gradient(
                    135deg,
                    #2563eb,
                    #1e40af
            );
            color:white;
            text-align:center;
            padding:40px;
        }

        .header i{
            font-size:70px;
            margin-bottom:15px;
        }

        .header h1{
            font-weight:bold;
        }

        .body-content{
            padding:40px;
        }

        .form-control,
        .form-select{
            border-radius:12px;
            height:50px;
        }

        textarea.form-control{
            height:auto;
        }

        .btn-register{
            height:55px;
            border:none;
            border-radius:12px;
            background:#2563eb;
            color:white;
            font-size:18px;
            font-weight:bold;
            transition:.3s;
        }

        .btn-register:hover{
            background:#1d4ed8;
        }

        .login-link{
            text-decoration:none;
            font-weight:bold;
        }

    </style>

</head>

<body>

<div class="register-card">

    <div class="header">

        <i class="fas fa-user-plus"></i>

        <h1>Registrasi Pasien</h1>

        <p>
            Lengkapi data untuk membuat akun pasien
        </p>

    </div>

    <div class="body-content">

        <form method="post"
              action="/register"
              th:object="${user}">

            <div class="mb-3">

                <label class="mb-2">

                    <i class="fas fa-user"></i>
                    Nama Lengkap

                </label>

                <input type="text"
                       name="fullName"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="mb-2">

                    <i class="fas fa-venus-mars"></i>
                    Jenis Kelamin

                </label>

                <select name="gender"
                        class="form-select"
                        required>

                    <option value="">
                        Pilih Gender
                    </option>

                    <option value="Laki-laki">
                        Laki-laki
                    </option>

                    <option value="Perempuan">
                        Perempuan
                    </option>

                </select>

            </div>

            <div class="mb-3">

                <label class="mb-2">

                    <i class="fas fa-phone"></i>
                    Nomor HP

                </label>

                <input type="text"
                       name="phone"
                       class="form-control"
                       required>

            </div>

            <div class="mb-3">

                <label class="mb-2">

                    <i class="fas fa-location-dot"></i>
                    Alamat

                </label>

                <textarea
                        name="address"
                        rows="3"
                        class="form-control"
                        required></textarea>

            </div>

            <div class="mb-3">

                <label class="mb-2">

                    <i class="fas fa-at"></i>
                    Username

                </label>

                <input type="text"
                       th:field="*{username}"
                       class="form-control"
                       required>

            </div>

            <div class="mb-4">

                <label class="mb-2">

                    <i class="fas fa-lock"></i>
                    Password

                </label>

                <input type="password"
                       th:field="*{password}"
                       class="form-control"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-register w-100">

                <i class="fas fa-user-check"></i>
                Daftar Sekarang

            </button>

        </form>

        <div class="text-center mt-4">

            Sudah punya akun?

            <a href="/login"
               class="login-link">

                Login di sini

            </a>

        </div>

    </div>

</div>

</body>

</html>
