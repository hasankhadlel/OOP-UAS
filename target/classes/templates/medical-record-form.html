<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Pemeriksaan Pasien</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#f8fafc;
            font-family:'Poppins',sans-serif;
        }

        .card-form{
            border:none;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0 15px 35px rgba(0,0,0,.08);
            animation:fadeIn .4s ease;
        }

        .header{
            background:linear-gradient(
                    135deg,
                    #dc2626,
                    #991b1b
            );
            color:white;
            padding:30px;
        }

        .header h2{
            margin:0;
            font-weight:700;
        }

        .header p{
            margin-top:8px;
            opacity:.9;
        }

        .card-body{
            padding:35px;
        }

        .form-label{
            font-weight:600;
            margin-bottom:10px;
        }

        .form-control{
            border-radius:14px;
            border:1px solid #e2e8f0;
        }

        input.form-control{
            height:52px;
        }

        textarea.form-control{
            resize:none;
        }

        .form-control:focus{
            border-color:#dc2626;
            box-shadow:0 0 0 .25rem rgba(220,38,38,.15);
        }

        .readonly-box{
            background:#f8fafc;
        }

        .complaint-box{
            background:#fff7ed;
            border-left:5px solid #f97316;
        }

        .info-card{
            background:#f3f4f6;
            border-left:5px solid #dc2626;
            padding:15px;
            border-radius:12px;
            margin-bottom:25px;
        }

        .btn{
            border-radius:14px;
            padding:12px 20px;
            font-weight:600;
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-2px);
        }

        .btn-save{
            background:#dc2626;
            color:white;
            border:none;
        }

        .btn-save:hover{
            background:#b91c1c;
            color:white;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(10px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

    </style>

</head>

<body>

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-9">

            <div class="card card-form">

                <div class="header">

                    <h2>

                        <i class="fas fa-file-medical"></i>

                        Pemeriksaan Pasien

                    </h2>

                    <p>

                        Isi diagnosis dan tindakan medis pasien

                    </p>

                </div>

                <div class="card-body">

                    <div class="info-card">

                        <i class="fas fa-circle-info"></i>

                        Lengkapi hasil pemeriksaan pasien sebelum menyimpan rekam medis.

                    </div>

                    <form action="/medical-records/save"
                          method="post">

                        <input type="hidden"
                               name="appointmentId"
                               th:value="${appointment.id}">

                        <div class="row">

                            <div class="col-md-6">

                                <div class="mb-4">

                                    <label class="form-label">

                                        <i class="fas fa-user-injured"></i>

                                        Nama Pasien

                                    </label>

                                    <input type="text"
                                           class="form-control readonly-box"
                                           th:value="${appointment.patient.fullName}"
                                           readonly>

                                </div>

                            </div>

                            <div class="col-md-6">

                                <div class="mb-4">

                                    <label class="form-label">

                                        <i class="fas fa-user-doctor"></i>

                                        Dokter

                                    </label>

                                    <input type="text"
                                           class="form-control readonly-box"
                                           th:value="${appointment.doctor.fullName}"
                                           readonly>

                                </div>

                            </div>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                <i class="fas fa-notes-medical"></i>

                                Keluhan Pasien

                            </label>

                            <textarea
                                    class="form-control complaint-box"
                                    rows="5"
                                    readonly
                                    th:text="${appointment.complaint}">
                            </textarea>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                <i class="fas fa-stethoscope"></i>

                                Diagnosis

                            </label>

                            <textarea
                                    name="diagnosis"
                                    class="form-control"
                                    rows="5"
                                    placeholder="Masukkan hasil diagnosis dokter..."
                                    required>
                            </textarea>

                        </div>

                        <div class="mb-4">

                            <label class="form-label">

                                <i class="fas fa-pills"></i>

                                Tindakan / Obat

                            </label>

                            <textarea
                                    name="treatment"
                                    class="form-control"
                                    rows="5"
                                    placeholder="Masukkan tindakan medis atau resep obat..."
                                    required>
                            </textarea>

                        </div>

                        <div class="d-flex gap-2">

                            <button class="btn btn-save">

                                <i class="fas fa-floppy-disk"></i>

                                Simpan Rekam Medis

                            </button>

                            <a href="/appointments"
                               class="btn btn-secondary">

                                <i class="fas fa-arrow-left"></i>

                                Kembali

                            </a>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

</body>

</html>
