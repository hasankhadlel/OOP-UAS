<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Data Dokter</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#f8fafc;
            font-family:'Poppins',sans-serif;
        }

        .page-header{
            background:linear-gradient(
                    135deg,
                    #16a34a,
                    #15803d
            );
            color:white;
            padding:30px;
            border-radius:25px;
            margin-bottom:25px;
            box-shadow:0 15px 30px rgba(22,163,74,.25);
        }

        .page-header h1{
            font-weight:700;
            margin-bottom:10px;
        }

        .stats-card{
            border:none;
            border-radius:20px;
            background:white;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
            margin-bottom:25px;
        }

        .stats-number{
            font-size:35px;
            font-weight:700;
            color:#16a34a;
        }

        .search-box{
            background:white;
            border:none;
            border-radius:20px;
            padding:25px;
            margin-bottom:25px;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        .card-custom{
            border:none;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        .table{
            margin-bottom:0;
        }

        .table thead{
            background:#1e293b;
            color:white;
        }

        .table tbody tr{
            transition:.3s;
        }

        .table tbody tr:hover{
            background:#f8fafc;
            transform:scale(1.005);
        }

        .doctor-avatar{
            width:45px;
            height:45px;
            border-radius:50%;
            background:#16a34a;
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:700;
            margin-right:12px;
        }

        .specialist-badge{
            background:#dcfce7;
            color:#166534;
            padding:8px 15px;
            border-radius:20px;
            font-size:13px;
            font-weight:600;
        }

        .btn{
            border-radius:12px;
            font-weight:500;
            transition:.3s;
        }

        .btn:hover{
            transform:translateY(-2px);
        }

        .form-control{
            border-radius:12px;
            height:50px;
        }

        .fade-card{
            animation:fadeIn .4s ease;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(10px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

    </style>

</head>

<body>

<div class="container py-4 fade-card">

    <div class="page-header">

        <h1>

            <i class="fas fa-user-doctor"></i>

            Data Dokter

        </h1>

        <p class="mb-0">

            Kelola seluruh data dokter klinik

        </p>

    </div>

    <div class="row mb-4">

        <div class="col-md-4">

            <div class="stats-card">

                <div class="card-body text-center">

                    <h6>Total Dokter</h6>

                    <div class="stats-number"
                         th:text="${#lists.size(doctors)}">

                        0

                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="d-flex gap-2 mb-4">

        <a href="/"
           class="btn btn-dark">

            <i class="fas fa-house"></i>
            Dashboard

        </a>

        <a href="/doctors/add"
           class="btn btn-success">

            <i class="fas fa-plus"></i>
            Tambah Dokter

        </a>

    </div>

    <div class="search-box">

        <form method="get"
              action="/doctors">

            <div class="row g-3">

                <div class="col-md-10">

                    <input type="text"
                           name="keyword"
                           class="form-control"
                           placeholder="Cari nama dokter..."
                           th:value="${keyword}">

                </div>

                <div class="col-md-2">

                    <button class="btn btn-primary w-100 h-100">

                        <i class="fas fa-search"></i>

                        Cari

                    </button>

                </div>

            </div>

        </form>

        <div class="mt-3">

            <a href="/doctors"
               class="btn btn-secondary btn-sm">

                <i class="fas fa-rotate-left"></i>

                Reset

            </a>

        </div>

    </div>

    <div class="card card-custom">

        <div class="card-body p-0">

            <table class="table align-middle">

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Dokter</th>
                    <th>Spesialisasi</th>
                    <th>No HP</th>
                    <th>Aksi</th>

                </tr>

                </thead>

                <tbody>

                <tr th:if="${#lists.isEmpty(doctors)}">

                    <td colspan="5"
                        class="text-center text-danger p-4">

                        <i class="fas fa-circle-exclamation"></i>

                        Data dokter tidak ditemukan

                    </td>

                </tr>

                <tr th:each="doctor : ${doctors}">

                    <td>

                        <strong th:text="${doctor.id}"></strong>

                    </td>

                    <td>

                        <div class="d-flex align-items-center">

                            <div class="doctor-avatar">

                                <span th:text="${#strings.substring(doctor.fullName,0,1)}">
                                    D
                                </span>

                            </div>

                            <strong th:text="${doctor.fullName}">
                            </strong>

                        </div>

                    </td>

                    <td>

                        <span class="specialist-badge"
                              th:text="${doctor.specialization}">
                        </span>

                    </td>

                    <td th:text="${doctor.phone}"></td>

                    <td>

                        <a th:href="@{/doctors/edit/{id}(id=${doctor.id})}"
                           class="btn btn-outline-warning btn-sm">

                            <i class="fas fa-pen"></i>

                        </a>

                        <a th:href="@{/doctors/delete/{id}(id=${doctor.id})}"
                           class="btn btn-outline-danger btn-sm"
                           onclick="return confirm('Yakin ingin menghapus data dokter?')">

                            <i class="fas fa-trash"></i>

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
