```html
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <title>Form Pasien</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <style>

        body{
            background:#f4f6f9;
        }

        .card-form{
            border:none;
            border-radius:20px;
            box-shadow:0 5px 15px rgba(0,0,0,.08);
        }

        .header{
            background:linear-gradient(135deg,#2563eb,#1d4ed8);
            color:white;
            padding:20px;
            border-radius:20px 20px 0 0;
        }

    </style>

</head>

<body>

<div class="container mt-5">

    <div class="card card-form">

        <div class="header">

            <h2>
                <i class="fas fa-user-injured"></i>
                Form Pasien
            </h2>

        </div>

        <div class="card-body">

            <form th:action="@{/patients/save}"
                  th:object="${patient}"
                  method="post">

                <input type="hidden"
                       th:field="*{id}">

                <div class="mb-3">

                    <label>Nama Pasien</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{fullName}"
                           required>

                </div>

                <div class="mb-3">

                    <label>Gender</label>

                    <select class="form-control"
                            th:field="*{gender}">

                        <option value="Laki-laki">
                            Laki-laki
                        </option>

                        <option value="Perempuan">
                            Perempuan
                        </option>

                    </select>

                </div>

                <div class="mb-3">

                    <label>No HP</label>

                    <input type="text"
                           class="form-control"
                           th:field="*{phone}">

                </div>

                <div class="mb-3">

                    <label>Alamat</label>

                    <textarea class="form-control"
                              th:field="*{address}">
                    </textarea>

                </div>

                <button class="btn btn-primary">
                    Simpan
                </button>

                <a href="/patients"
                   class="btn btn-secondary">
                    Kembali
                </a>

            </form>

        </div>

    </div>

</div>

</body>

</html>
```
