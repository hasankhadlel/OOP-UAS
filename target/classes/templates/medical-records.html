<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Rekam Medis</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            background:#f8fafc;
            font-family:'Poppins',sans-serif;
        }

        .page-header{
            background:linear-gradient(
                    135deg,
                    #dc2626,
                    #991b1b
            );
            color:white;
            padding:30px;
            border-radius:25px;
            margin-bottom:25px;
            box-shadow:0 15px 30px rgba(220,38,38,.25);
        }

        .page-header h1{
            font-weight:700;
            margin-bottom:10px;
        }

        .page-header p{
            opacity:.9;
        }

        .stats-card{
            border:none;
            border-radius:20px;
            background:white;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
            margin-bottom:25px;
        }

        .stats-number{
            font-size:35px;
            font-weight:700;
            color:#dc2626;
        }

        .card-custom{
            border:none;
            border-radius:25px;
            overflow:hidden;
            box-shadow:0 10px 25px rgba(0,0,0,.08);
        }

        .table{
            margin-bottom:0;
        }

        .table thead{
            background:#1e293b;
            color:white;
        }

        .table tbody tr{
            transition:.3s;
        }

        .table tbody tr:hover{
            background:#f8fafc;
            transform:scale(1.005);
        }

        .btn{
            border-radius:12px;
            font-weight:500;
        }

        .btn:hover{
            transform:translateY(-2px);
        }

        .patient-avatar{
            width:42px;
            height:42px;
            border-radius:50%;
            background:#dc2626;
            color:white;
            display:flex;
            align-items:center;
            justify-content:center;
            font-weight:bold;
            margin-right:12px;
        }

        .diagnosis-badge{
            background:#dbeafe;
            color:#1d4ed8;
            padding:8px 15px;
            border-radius:20px;
            font-size:13px;
            font-weight:600;
        }

        .status-completed{
            background:#dcfce7;
            color:#166534;
            padding:8px 15px;
            border-radius:20px;
            font-size:13px;
            font-weight:600;
        }

        .complaint-box{
            max-width:250px;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }

        .treatment-box{
            max-width:250px;
            white-space:nowrap;
            overflow:hidden;
            text-overflow:ellipsis;
        }

        .fade-card{
            animation:fadeIn .4s ease;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(10px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }

        }

    </style>

</head>

<body>

<div class="container py-4 fade-card">

    <div class="page-header">

        <h1>

            <i class="fas fa-file-medical"></i>

            Rekam Medis Pasien

        </h1>

        <p class="mb-0">

            Kelola seluruh riwayat pemeriksaan pasien klinik

        </p>

    </div>

    <div class="row mb-4">

        <div class="col-md-4">

            <div class="stats-card">

                <div class="card-body text-center">

                    <h6>Total Rekam Medis</h6>

                    <div class="stats-number"
                         th:text="${#lists.size(records)}">

                        0

                    </div>

                </div>

            </div>

        </div>

    </div>

    <div class="d-flex gap-2 mb-4">

        <a href="/"
           class="btn btn-dark">

            <i class="fas fa-house"></i>

            Dashboard

        </a>

    </div>

    <div class="card card-custom">

        <div class="card-body p-0">

            <table class="table align-middle">

                <thead>

                <tr>

                    <th>ID</th>
                    <th>Pasien</th>
                    <th>Dokter</th>
                    <th>Keluhan</th>
                    <th>Diagnosa</th>
                    <th>Tindakan / Obat</th>
                    <th>Status</th>
                    <th>Aksi</th>

                </tr>

                </thead>

                <tbody>

                <tr th:each="record : ${records}">

                    <td>

                        <strong th:text="${record.id}"></strong>

                    </td>

                    <td>

                        <div class="d-flex align-items-center">

                            <div class="patient-avatar">

                                <span th:text="${#strings.substring(record.appointment.patient.fullName,0,1)}">
                                    A
                                </span>

                            </div>

                            <strong th:text="${record.appointment.patient.fullName}">
                            </strong>

                        </div>

                    </td>

                    <td th:text="${record.appointment.doctor.fullName}">
                    </td>

                    <td>

                        <div class="complaint-box"
                             th:text="${record.complaint}">
                        </div>

                    </td>

                    <td>

                        <span class="diagnosis-badge"
                              th:text="${record.diagnosis}">
                        </span>

                    </td>

                    <td>

                        <div class="treatment-box"
                             th:text="${record.treatment}">
                        </div>

                    </td>

                    <td>

                        <span class="status-completed">

                            COMPLETED

                        </span>

                    </td>

                    <td>

                        <a th:href="@{/medical-records/delete/{id}(id=${record.id})}"
                           class="btn btn-outline-danger btn-sm"
                           onclick="return confirm('Yakin ingin menghapus rekam medis ini?')">

                            <i class="fas fa-trash"></i>

                        </a>

                    </td>

                </tr>

                </tbody>

            </table>

        </div>

    </div>

</div>

</body>

</html>
