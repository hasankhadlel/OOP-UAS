<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>Clinic Management System</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
          rel="stylesheet">

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
        }

        body{
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:linear-gradient(
                    135deg,
                    #2563eb,
                    #7c3aed
            );
            font-family:'Segoe UI',sans-serif;
        }

        .login-container{
            width:100%;
            max-width:1000px;
            display:flex;
            overflow:hidden;
            border-radius:30px;
            background:white;
            box-shadow:0 25px 50px rgba(0,0,0,.25);
        }

        .left-side{
            flex:1;
            background:linear-gradient(
                    135deg,
                    #2563eb,
                    #1e40af
            );
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
            padding:50px;
        }

        .left-side h1{
            font-size:48px;
            font-weight:bold;
            margin-bottom:20px;
        }

        .left-side p{
            text-align:center;
            font-size:18px;
            opacity:.9;
        }

        .hospital-icon{
            font-size:90px;
            margin-bottom:20px;
        }

        .right-side{
            flex:1;
            padding:50px;
        }

        .login-title{
            font-size:35px;
            font-weight:bold;
            margin-bottom:10px;
        }

        .subtitle{
            color:#6b7280;
            margin-bottom:30px;
        }

        .form-control{
            height:50px;
            border-radius:12px;
        }

        .btn-login{
            height:50px;
            border:none;
            border-radius:12px;
            background:#2563eb;
            color:white;
            font-weight:bold;
            transition:.3s;
        }

        .btn-login:hover{
            background:#1d4ed8;
        }

        .register-link{
            text-decoration:none;
            font-weight:bold;
        }

        @media(max-width:768px){

            .login-container{
                flex-direction:column;
                margin:20px;
            }

            .left-side{
                padding:30px;
            }

            .hospital-icon{
                font-size:60px;
            }

            .left-side h1{
                font-size:32px;
            }

        }

    </style>

</head>

<body>

<div class="login-container">

    <div class="left-side">

        <div class="hospital-icon">
            🏥
        </div>

        <h1>Klinik Sehat</h1>

        <p>
            Sistem Manajemen Klinik Modern untuk
            Pasien, Dokter dan Administrator.
        </p>

    </div>

    <div class="right-side">

        <div class="login-title">
            Login
        </div>

        <div class="subtitle">
            Silakan masuk ke akun Anda
        </div>

        <div th:if="${param.error}"
             class="alert alert-danger">

            Username atau Password salah

        </div>

        <div th:if="${param.logout}"
             class="alert alert-success">

            Logout berhasil

        </div>

        <div th:if="${param.registered}"
             class="alert alert-success">

            Registrasi berhasil.
            Silakan login.

        </div>

        <form method="post"
              action="/login">

            <div class="mb-3">

                <label class="mb-2">

                    <i class="fas fa-user"></i>
                    Username

                </label>

                <input type="text"
                       name="username"
                       class="form-control"
                       required>

            </div>

            <div class="mb-4">

                <label class="mb-2">

                    <i class="fas fa-lock"></i>
                    Password

                </label>

                <input type="password"
                       name="password"
                       class="form-control"
                       required>

            </div>

            <button type="submit"
                    class="btn btn-login w-100">

                <i class="fas fa-right-to-bracket"></i>
                Login

            </button>

        </form>

        <div class="text-center mt-4">

            Belum punya akun?

            <a href="/register"
               class="register-link">

                Registrasi Sekarang

            </a>

        </div>

    </div>

</div>

</body>

</html>
